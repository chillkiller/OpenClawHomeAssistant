name: OpenClaw HA Addon (Dev)
slug: openclaw-ha-addon
description: Development version of the OpenClaw Home Assistant Addon
url: https://github.com/chillkiller/openclaw-ha-addon
version: 0.7.5.2
arch:
  - aarch64
  - amd64
  - armv7
ports:
  80/tcp: 80
map:
  - config:rw
  - share:rw
  - options:rw
options:
  log_level: info
  ssl: true
  certfile: fullchain.pem
  keyfile: privkey.pem
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  ssl: bool
  certfile: str
  keyfile: str
init: false